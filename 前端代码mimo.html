<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集趣 · 校园活动平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Source+Serif+4:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F6F1E9;--surface:#FFF;--surface-alt:#EDE8DF;
  --ink:#1A1613;--ink-muted:#78716C;--ink-light:#A8A29E;
  --accent:#B91C1C;--accent-hover:#991B1B;--accent-bg:#FEF2F2;
  --green:#166534;--green-bg:#F0FDF4;--amber:#A16207;--amber-bg:#FFFBEB;
  --blue:#1E40AF;--blue-bg:#EFF6FF;--purple:#7E22CE;--purple-bg:#FAF5FF;
  --border:#1A1613;--border-light:#D6CFC4;
  --shadow:3px 3px 0 var(--border);--shadow-sm:2px 2px 0 var(--border);
  --radius:3px;--radius-lg:6px;
  --font-display:'Instrument Serif',Georgia,serif;
  --font-body:'Source Serif 4','Songti SC',serif;
  --font-mono:'DM Mono','Menlo',monospace;
  --header-h:60px;--sidebar-w:240px;
}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}
button{font-family:var(--font-mono);cursor:pointer;border:none;background:none;font-size:.82rem}
input,select,textarea{font-family:var(--font-mono);font-size:.82rem;border:2px solid var(--border);border-radius:var(--radius);padding:10px 12px;background:var(--surface);color:var(--ink);outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border-light);font-size:.82rem}
th{font-family:var(--font-mono);font-weight:500;background:var(--surface-alt);position:sticky;top:0}

/* ========== UTILITIES ========== */
.mono{font-family:var(--font-mono)}
.serif{font-family:var(--font-display)}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}.gap-24{gap:24px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.w-full{width:100%}.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
.text-center{text-align:center}.text-right{text-align:right}.text-muted{color:var(--ink-muted)}.text-sm{font-size:.78rem}.text-xs{font-size:.7rem}
.hidden{display:none!important}

/* ========== COMPONENTS ========== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:2px solid var(--border);border-radius:var(--radius);background:var(--surface);font-weight:500;transition:all .12s;box-shadow:var(--shadow-sm);white-space:nowrap}
.btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--border)}
.btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--border)}
.btn-primary{background:var(--ink);color:var(--surface)}
.btn-primary:hover{background:#2d2820}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-ghost{background:transparent;box-shadow:none;border-color:transparent}
.btn-ghost:hover{background:var(--surface-alt);box-shadow:none;transform:none}
.btn-sm{padding:6px 12px;font-size:.75rem}
.btn-danger{background:var(--accent);color:#fff;border-color:var(--accent)}

.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:2px;font-family:var(--font-mono);font-size:.7rem;font-weight:500;border:1.5px solid;letter-spacing:.02em}
.badge-red{color:var(--accent);border-color:var(--accent);background:var(--accent-bg)}
.badge-green{color:var(--green);border-color:var(--green);background:var(--green-bg)}
.badge-amber{color:var(--amber);border-color:var(--amber);background:var(--amber-bg)}
.badge-blue{color:var(--blue);border-color:var(--blue);background:var(--blue-bg)}
.badge-purple{color:var(--purple);border-color:var(--purple);background:var(--purple-bg)}
.badge-gray{color:var(--ink-muted);border-color:var(--border-light);background:var(--surface-alt)}

.card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--border)}
.card-body{padding:20px}
.card-header{padding:16px 20px;border-bottom:2px solid var(--border);background:var(--surface-alt);font-family:var(--font-mono);font-weight:500;font-size:.82rem;display:flex;align-items:center;justify-content:space-between}
.card-flat{box-shadow:none}
.card-flat:hover{transform:none;box-shadow:none}

.stat-card{padding:20px;border:2px solid var(--border);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-sm)}
.stat-card .stat-value{font-family:var(--font-display);font-size:2.2rem;line-height:1.1}
.stat-card .stat-label{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted);margin-top:4px;text-transform:uppercase;letter-spacing:.08em}

.section-title{font-family:var(--font-display);font-size:1.6rem;display:flex;align-items:center;gap:12px}
.section-title::after{content:'';flex:1;height:2px;background:var(--border)}

.modal-overlay{position:fixed;inset:0;background:rgba(26,22,19,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}
.modal{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-lg);box-shadow:6px 6px 0 var(--border);width:100%;max-width:560px;max-height:85vh;overflow-y:auto;animation:slideUp .2s}
.modal-header{padding:20px 24px;border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-family:var(--font-display);font-size:1.3rem}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px}

.form-group{margin-bottom:16px}
.form-group label{display:block;font-family:var(--font-mono);font-size:.78rem;font-weight:500;margin-bottom:6px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.06em}
.form-group input,.form-group select,.form-group textarea{width:100%}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.tag{display:inline-block;padding:2px 8px;border:1.5px solid var(--border-light);border-radius:2px;font-family:var(--font-mono);font-size:.7rem;color:var(--ink-muted);margin:2px}

.empty-state{text-align:center;padding:60px 20px;color:var(--ink-muted)}
.empty-state .empty-icon{font-size:3rem;margin-bottom:12px;opacity:.4}
.empty-state p{font-family:var(--font-mono);font-size:.82rem}

.toast{position:fixed;top:20px;right:20px;z-index:2000;padding:14px 20px;border:2px solid var(--border);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow);font-family:var(--font-mono);font-size:.82rem;animation:slideIn .2s;display:flex;align-items:center;gap:10px}
.toast-success{border-color:var(--green);background:var(--green-bg)}
.toast-error{border-color:var(--accent);background:var(--accent-bg)}

.progress-bar{height:8px;background:var(--surface-alt);border:1.5px solid var(--border-light);border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--ink);transition:width .3s}

.avatar{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:1rem;background:var(--surface-alt);flex-shrink:0}
.avatar-lg{width:56px;height:56px;font-size:1.4rem}

/* ========== LOGIN PAGE ========== */
.login-page{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
.login-brand{background:var(--ink);color:var(--surface);display:flex;flex-direction:column;justify-content:center;padding:60px;position:relative;overflow:hidden}
.login-brand::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(255,255,255,.02) 30px,rgba(255,255,255,.02) 60px)}
.login-brand h1{font-family:var(--font-display);font-size:3.8rem;line-height:1;margin-bottom:16px;position:relative}
.login-brand .tagline{font-family:var(--font-mono);font-size:.88rem;color:rgba(255,255,255,.6);max-width:380px;line-height:1.7;position:relative}
.login-brand .edition{position:absolute;bottom:40px;left:60px;font-family:var(--font-mono);font-size:.72rem;color:rgba(255,255,255,.3);letter-spacing:.12em;text-transform:uppercase}
.login-right{display:flex;flex-direction:column;justify-content:center;padding:60px;background:var(--bg)}
.login-form-container{max-width:400px;width:100%;margin:0 auto}
.login-form-container h2{font-family:var(--font-display);font-size:1.8rem;margin-bottom:8px}
.login-form-container .subtitle{font-family:var(--font-mono);font-size:.78rem;color:var(--ink-muted);margin-bottom:32px}
.login-form-container .form-group input{padding:12px 14px}
.login-form-container .btn{width:100%;justify-content:center;padding:13px;font-size:.88rem;margin-top:8px}
.demo-accounts{margin-top:36px;border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
.demo-accounts-header{padding:10px 14px;background:var(--ink);color:var(--surface);font-family:var(--font-mono);font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:8px}
.demo-accounts-header::before{content:'>'}
.demo-account{padding:12px 14px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .1s;font-family:var(--font-mono);font-size:.78rem}
.demo-account:last-child{border-bottom:none}
.demo-account:hover{background:var(--surface-alt)}
.demo-account .role-name{font-weight:500}
.demo-account .creds{color:var(--ink-muted);font-size:.72rem}
.demo-account .fill-hint{font-size:.68rem;color:var(--accent);opacity:0;transition:opacity .15s}
.demo-account:hover .fill-hint{opacity:1}

/* ========== APP LAYOUT ========== */
.app-layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--ink);color:var(--surface);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100;transition:transform .25s}
.sidebar-brand{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-brand h2{font-family:var(--font-display);font-size:1.4rem;color:var(--surface)}
.sidebar-brand .role-tag{font-family:var(--font-mono);font-size:.68rem;color:rgba(255,255,255,.4);margin-top:2px;text-transform:uppercase;letter-spacing:.1em}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto}
.sidebar-section{margin-bottom:20px}
.sidebar-section-title{font-family:var(--font-mono);font-size:.65rem;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.12em;padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);font-family:var(--font-mono);font-size:.8rem;color:rgba(255,255,255,.6);cursor:pointer;transition:all .12s;margin-bottom:2px}
.nav-item:hover{color:var(--surface);background:rgba(255,255,255,.08)}
.nav-item.active{color:var(--surface);background:rgba(255,255,255,.12);font-weight:500}
.nav-item .nav-icon{width:20px;text-align:center;font-size:1rem}
.sidebar-footer{padding:16px 12px;border-top:1px solid rgba(255,255,255,.1)}
.sidebar-footer .user-info{display:flex;align-items:center;gap:10px;padding:8px;margin-bottom:8px}
.sidebar-footer .user-info .avatar{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:var(--surface);width:32px;height:32px;font-size:.82rem}
.sidebar-footer .user-name{font-family:var(--font-mono);font-size:.78rem;color:var(--surface)}
.sidebar-footer .user-role{font-size:.68rem;color:rgba(255,255,255,.4)}
.sidebar-footer .logout-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--radius);font-family:var(--font-mono);font-size:.78rem;color:rgba(255,255,255,.5);cursor:pointer;width:100%;transition:all .12s}
.sidebar-footer .logout-btn:hover{color:var(--accent);background:rgba(185,28,28,.15)}

.main-area{flex:1;margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
.topbar{height:var(--header-h);border-bottom:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-title{font-family:var(--font-display);font-size:1.2rem}
.topbar-date{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted)}
.topbar-right{display:flex;align-items:center;gap:12px}
.notif-btn{position:relative;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);border:1.5px solid var(--border-light);font-size:1.1rem;transition:all .12s}
.notif-btn:hover{border-color:var(--border);background:var(--surface-alt)}
.notif-badge{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;font-family:var(--font-mono);font-size:.6rem;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface)}
.hamburger{display:none;width:36px;height:36px;align-items:center;justify-content:center;border:1.5px solid var(--border-light);border-radius:var(--radius);font-size:1.2rem;cursor:pointer}

.content{flex:1;padding:28px}

/* ========== ACTIVITY CARD ========== */
.activity-card{border:2px solid var(--border);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-sm);overflow:hidden;transition:all .15s;cursor:pointer;position:relative}
.activity-card:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--border)}
.activity-card-img{height:160px;background:var(--surface-alt);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.activity-card-img .placeholder-icon{font-size:3rem;opacity:.2}
.activity-card-badges{position:absolute;top:10px;left:10px;display:flex;gap:6px;flex-wrap:wrap}
.activity-card-badges .badge{background:var(--surface);font-size:.65rem}
.activity-card-body{padding:16px}
.activity-card-title{font-family:var(--font-display);font-size:1.15rem;margin-bottom:8px;line-height:1.3}
.activity-card-meta{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted);display:flex;flex-direction:column;gap:4px}
.activity-card-meta span{display:flex;align-items:center;gap:6px}
.activity-card-footer{padding:12px 16px;border-top:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.activity-card-footer .spots{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-muted)}
.activity-card-footer .spots strong{color:var(--ink)}

/* ========== FILTER BAR ========== */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;align-items:center}
.filter-bar .search-input{flex:1;min-width:200px;max-width:360px;position:relative}
.filter-bar .search-input input{padding-left:36px;width:100%}
.filter-bar .search-input::before{content:'⌕';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:1rem;color:var(--ink-muted);pointer-events:none}
.filter-chip{padding:7px 14px;border:1.5px solid var(--border-light);border-radius:2px;font-family:var(--font-mono);font-size:.75rem;cursor:pointer;transition:all .12s;background:var(--surface)}
.filter-chip:hover{border-color:var(--border)}
.filter-chip.active{background:var(--ink);color:var(--surface);border-color:var(--ink)}

/* ========== TABLE WRAPPER ========== */
.table-wrap{overflow-x:auto;border:2px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);background:var(--surface)}

/* ========== DETAIL VIEW ========== */
.detail-header{display:flex;gap:24px;margin-bottom:24px}
.detail-img{width:320px;height:220px;border:2px solid var(--border);border-radius:var(--radius);background:var(--surface-alt);display:flex;align-items:center;justify-content:center;font-size:4rem;opacity:.15;flex-shrink:0}
.detail-info{flex:1}
.detail-info h1{font-family:var(--font-display);font-size:2rem;margin-bottom:8px}
.detail-meta{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.detail-meta-item{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:.8rem;color:var(--ink-muted)}
.detail-desc{font-size:.95rem;line-height:1.8;color:var(--ink);margin-bottom:20px}
.detail-actions{display:flex;gap:10px;flex-wrap:wrap}

/* ========== CALENDAR ========== */
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.calendar-header-cell{padding:8px;text-align:center;font-family:var(--font-mono);font-size:.72rem;font-weight:500;color:var(--ink-muted);text-transform:uppercase}
.calendar-cell{min-height:80px;padding:6px;border:1px solid var(--border-light);background:var(--surface);font-family:var(--font-mono);font-size:.72rem;position:relative}
.calendar-cell.today{background:var(--amber-bg);border-color:var(--amber)}
.calendar-cell .day-num{font-weight:500;margin-bottom:4px}
.calendar-cell .event-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin:1px}

/* ========== MOBILE BOTTOM NAV ========== */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--ink);border-top:2px solid rgba(255,255,255,.1);z-index:100;padding:6px 0 env(safe-area-inset-bottom)}
.bottom-nav-items{display:flex;justify-content:space-around}
.bottom-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;color:rgba(255,255,255,.45);font-family:var(--font-mono);font-size:.6rem;cursor:pointer;transition:color .12s;border:none;background:none}
.bottom-nav-item.active{color:var(--surface)}
.bottom-nav-item .nav-icon{font-size:1.2rem}

/* ========== OVERLAY (mobile sidebar) ========== */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(26,22,19,.5);z-index:99}

/* ========== ANIMATIONS ========== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.anim-in{animation:slideUp .3s ease both}
.anim-in-1{animation-delay:.05s}.anim-in-2{animation-delay:.1s}.anim-in-3{animation-delay:.15s}.anim-in-4{animation-delay:.2s}.anim-in-5{animation-delay:.25s}

/* ========== RESPONSIVE ========== */
@media(max-width:1024px){
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:repeat(2,1fr)}
  .detail-header{flex-direction:column}
  .detail-img{width:100%}
}
@media(max-width:768px){
  :root{--sidebar-w:260px}
  .login-page{grid-template-columns:1fr}
  .login-brand{display:none}
  .login-right{padding:30px 20px;min-height:100vh}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .main-area{margin-left:0}
  .hamburger{display:flex}
  .content{padding:16px;padding-bottom:80px}
  .bottom-nav{display:block}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .filter-bar .search-input{max-width:100%;min-width:0}
  .topbar{padding:0 16px}
  .stat-card .stat-value{font-size:1.6rem}
  .section-title{font-size:1.3rem}
  .modal{max-width:100%;margin:10px;max-height:90vh}
  .detail-header{flex-direction:column}
  .detail-img{width:100%;height:160px}
  .activity-card-img{height:130px}
  .table-wrap{font-size:.78rem}
  th,td{padding:8px 10px}
}
@media(max-width:480px){
  .topbar-date{display:none}
  .filter-bar{gap:6px}
  .btn{padding:8px 14px;font-size:.78rem}
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--ink-muted)}

/* ========== GRAIN OVERLAY ========== */

function fillLogin(u, p) {
  const ui = document.getElementById('login-user');
  const pi = document.getElementById('login-pass');
  if (ui) { ui.value = u; ui.style.borderColor = 'var(--green)'; }
  if (pi) { pi.value = p; pi.style.borderColor = 'var(--green)'; }
  setTimeout(() => {
    if (ui) ui.style.borderColor = '';
    if (pi) pi.style.borderColor = '';
  }, 1500);
}

function handleLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value.trim();
  if (!u || !p) { toast('请输入用户名和密码', 'error'); return; }
  const user = MOCK_USERS.find(x => x.username === u && x.password === p);
  if (!user) { toast('用户名或密码错误', 'error'); return; }
  state.user = user;
  state.view = 'dashboard';
  state.selectedActivity = null;
  render();
  toast(`欢迎回来，${user.name}`);
}

function handleLogout() {
  state.user = null;
  state.view = 'dashboard';
  state.selectedActivity = null;
  state.sidebarOpen = false;
  render();
}

function renderActivityCard(a, idx) {
  const spots = a.maxCount - a.registeredCount;
  const full = spots <= 0;
  const colorIdx = a.id.replace('a','') % COLORS.length;
  return `
    <div class="activity-card anim-in anim-in-${idx%6}" onclick="viewActivity('${a.id}')">
      <div class="activity-card-img" style="background:${COLORS[colorIdx]}">
        <span class="placeholder-icon">${CAT_ICONS[a.category]||'📌'}</span>
        <div class="activity-card-badges">
          <span class="badge badge-blue">${a.category}</span>
          ${a.hasBonus ? '<span class="badge badge-amber">🎖 可加分</span>' : ''}
          ${a.fee > 0 ? `<span class="badge badge-purple">¥${a.fee}</span>` : ''}
        </div>
      </div>
      <div class="activity-card-body">
        <div class="activity-card-title">${a.title}</div>
        <div class="activity-card-meta">
          <span>🕐 ${a.startTime}</span>
          <span>📍 ${a.location}</span>
          <span>🏫 ${a.college}</span>
        </div>
      </div>

          isRegistered(state.user.id, a.id) ? '<span class="badge badge-green">已报名</span>' : ''}

  `;
}

function renderCalendar() {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayDate = now.getDate();
  const monthActs = MOCK_ACTIVITIES.filter(a => {
    const d = new Date(a.startTime);
    return d.getFullYear() === year && d.getMonth() === month && (a.status === 'published' || a.status === 'completed');
  });

  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += '<div class="calendar-cell" style="background:var(--surface-alt)"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dayActs = monthActs.filter(a => new Date(a.startTime).getDate() === d);
    const isToday = d === todayDate;
    cells += `
      <div class="calendar-cell ${isToday?'today':''}">
        <div class="day-num">${d}</div>
        ${dayActs.map(a => `<div class="event-dot" style="background:var(--accent)" title="${a.title}"></div>`).join('')}
        ${dayActs.slice(0,2).map(a => `<div style="font-size:.65rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;cursor:pointer" onclick="viewActivity('${a.id}')">${a.title}</div>`).join('')}
        ${dayActs.length > 2 ? `<div style="font-size:.6rem;color:var(--ink-muted)">+${dayActs.length-2} 更多</div>` : ''}
      </div>
    `;
  }

  return `
    <div class="flex justify-between items-center mb-24">
      <div class="section-title">${year}年${month+1}月 活动日历</div>
    </div>
    <div style="border:2px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);background:var(--surface)">
      <div class="calendar-grid">
        ${['日','一','二','三','四','五','六'].map(d => `<div class="calendar-header-cell">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
  `;
}

function submitActivity(status) {
  const title = document.getElementById('ca-title')?.value.trim();
  const category = document.getElementById('ca-category')?.value;
  if (!title) { toast('请填写活动标题', 'error'); return; }
  if (!category) { toast('请选择活动类型', 'error'); return; }

  const newAct = {
    id: 'a' + (MOCK_ACTIVITIES.length + 1),
    creatorId: state.user.id,
    title,
    category,
    description: document.getElementById('ca-desc')?.value || '',
    cover: '',
    startTime: document.getElementById('ca-start')?.value?.replace('T',' ') || '待定',
    endTime: document.getElementById('ca-end')?.value?.replace('T',' ') || '待定',
    location: document.getElementById('ca-location')?.value || '待定',
    maxCount: parseInt(document.getElementById('ca-max')?.value) || 100,
    registeredCount: 0,
    fee: parseFloat(document.getElementById('ca-fee')?.value) || 0,
    status: status === 'draft' ? 'draft' : 'pending',
    hasBonus: false,
    bonusType: '',
    bonusValue: 0,
    approvalStatus: status === 'draft' ? 'draft' : 'pending',
    tags: (document.getElementById('ca-tags')?.value || '').split(',').map(t=>t.trim()).filter(Boolean),
    createdAt: today(),
    college: document.getElementById('ca-college')?.value || state.user.college,
  };
  MOCK_ACTIVITIES.push(newAct);
  state.view = 'my-activities';
  render();
  toast(status === 'draft' ? '草稿已保存' : '活动已提交审批');
}

        </div>
        ${state.user.role === 'student' ? `
        <div class="detail-actions">
          ${a.status === 'completed' ? '<span class="badge badge-gray">活动已结束</span>' :
            full && !reg ? '<span class="badge badge-red">报名已满</span>' :
            reg ? `<button class="btn btn-accent" onclick="cancelRegByAct('${a.id}')">取消报名</button>` :

            ${a.tags.length > 0 ? `<div style="margin-top:16px">${a.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : ''}
          </div>

        </div>
      </div>

  `;
}

// ==================== EVENT HANDLERS ====================
function viewActivity(id) {
  const a = getActivity(id);
  if (a) { state.selectedActivity = a; render(); }
}

function registerActivity(actId) {
  const a = getActivity(actId);
  if (!a) return;
  if (isRegistered(state.user.id, actId)) { toast('你已经报名了', 'error'); return; }
  if (a.registeredCount >= a.maxCount) { toast('报名已满', 'error'); return; }
  MOCK_REGISTRATIONS.push({ id:'r'+Date.now(), userId:state.user.id, activityId:actId, status:'registered', registeredAt:today() });
  a.registeredCount++;
  MOCK_NOTIFS.unshift({ id:'n'+Date.now(), userId:state.user.id, title:'报名成功', content:`你已成功报名「${a.title}」`, time:new Date().toLocaleString('zh-CN'), read:false });
  render();
  toast('报名成功！');
}

function cancelReg(regId) {
  const r = MOCK_REGISTRATIONS.find(x => x.id === regId);
  if (!r) return;
  const a = getActivity(r.activityId);
  r.status = 'cancelled';
  if (a) a.registeredCount = Math.max(0, a.registeredCount - 1);
  render();
  toast('已取消报名');
}

function cancelRegByAct(actId) {
  const r = MOCK_REGISTRATIONS.find(x => x.userId === state.user.id && x.activityId === actId && x.status === 'registered');
  if (r) cancelReg(r.id);
}

function approveActivity(id) {
  const a = getActivity(id);
  if (a) { a.status = 'published'; a.approvalStatus = 'approved'; render(); toast('已通过审批'); }
}

function rejectActivity(id) {
  const a = getActivity(id);
  if (a) { a.status = 'rejected'; a.approvalStatus = 'rejected'; render(); toast('已驳回'); }
}

function editDraft(id) {
  const a = getActivity(id);
  if (a) {
    state.view = 'create-activity';
    render();
    setTimeout(() => {
      const titleEl = document.getElementById('ca-title');
      if (titleEl) titleEl.value = a.title;
    }, 50);
  }
}

function attachAppEvents() {
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (state.showNotifs) { state.showNotifs = false; render(); }
      else if (state.selectedActivity) { state.selectedActivity = null; render(); }
      else if (state.sidebarOpen) { state.sidebarOpen = false; render(); }
    }
  });
}

// ==================== INIT ====================
render();
</script>
